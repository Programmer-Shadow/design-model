<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>模板方法模式 Demo</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; color: #1f2937; margin: 0; }
    .nav { background: #1e293b; padding: 12px 24px; display: flex; gap: 20px; align-items: center; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 4px 8px; border-radius: 6px; }
    .nav a.active { color: #fff; background: #7c3aed; }
    .nav a:hover:not(.active) { color: #e2e8f0; }
    .card { max-width: 700px; margin: 32px auto; background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    h1 { margin-top: 0; font-size: 22px; }
    .row { margin-bottom: 14px; display: flex; gap: 10px; align-items: center; }
    label { width: 90px; font-size: 14px; }
    select { flex: 1; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    button { width: 100%; margin-top: 6px; padding: 11px; border: 0; border-radius: 8px; background: #7c3aed; color: #fff; cursor: pointer; font-size: 15px; font-weight: 500; }
    button:hover { background: #6d28d9; }
    .section-label { margin: 20px 0 8px; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .6px; }
    .meta { font-size: 13px; color: #4b5563; margin-bottom: 10px; }
    .meta span { font-weight: 600; color: #7c3aed; }
    .steps { display: flex; flex-direction: column; gap: 4px; }
    .step { padding: 7px 12px; border-left: 3px solid #7c3aed; background: #f5f3ff; border-radius: 0 6px 6px 0; font-size: 13px; font-family: 'Consolas', monospace; }
    pre { background: #0f172a; color: #cbd5e1; padding: 14px; border-radius: 8px; overflow: auto; font-size: 13px; max-height: 320px; margin: 0; }
    #result { display: none; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">策略模式</a>
    <a href="/template" class="active">模板方法</a>
    <a href="/simple-factory">简单工厂</a>
    <a href="/factory-method">工厂方法</a>
    <a href="/abstract-factory">抽象工厂</a>
    <a href="/chain">责任链</a>
    <a href="/singleton">单例模式</a>
  </div>
  <div class="card">
    <h1>模板方法模式 — 报表导出</h1>
    <div class="row">
      <label>导出格式</label>
      <select id="format">
        <option value="json">JSON</option>
        <option value="csv">CSV</option>
        <option value="csv-big">CSV（仅大额订单 — 钩子方法演示）</option>
        <option value="xml">XML</option>
      </select>
    </div>
    <button id="exportBtn">导出报表</button>

    <div id="result">
      <div class="section-label">执行类</div>
      <p class="meta">调用链路：<span>ReportExporter.export()</span> → <span id="exporterClass"></span></p>
      <div class="section-label">模板方法执行步骤</div>
      <div id="steps" class="steps"></div>
      <div class="section-label">导出结果</div>
      <pre id="output"></pre>
    </div>
  </div>

  <script>
    document.getElementById('exportBtn').addEventListener('click', async () => {
      const format = document.getElementById('format').value;
      const resp = await fetch(`/api/export?format=${format}`);
      const data = await resp.json();
      document.getElementById('exporterClass').textContent = data.exporterClass;
      document.getElementById('steps').innerHTML =
        data.steps.map(s => `<div class="step">${s}</div>`).join('');
      document.getElementById('output').textContent = data.output;
      document.getElementById('result').style.display = 'block';
    });
  </script>
</body>
</html>
