<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工厂方法模式 Demo</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; color: #1f2937; margin: 0; }
    .nav { background: #1e293b; padding: 12px 24px; display: flex; gap: 20px; align-items: center; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 4px 8px; border-radius: 6px; }
    .nav a.active { color: #fff; background: #dc2626; }
    .nav a:hover:not(.active) { color: #e2e8f0; }
    .card { max-width: 700px; margin: 32px auto; background: #fff; border-radius: 12px; padding: 28px; box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    h1 { margin-top: 0; font-size: 22px; }
    .desc { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }
    .desc code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .row { margin-bottom: 12px; display: flex; gap: 10px; align-items: center; }
    label { width: 90px; font-size: 14px; }
    select, input { flex: 1; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; }
    button { width: 100%; margin-top: 8px; padding: 11px; border: 0; border-radius: 8px; background: #dc2626; color: #fff; cursor: pointer; font-size: 15px; font-weight: 500; }
    button:hover { background: #b91c1c; }
    .section-label { margin: 20px 0 8px; font-size: 12px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .6px; }
    .meta { font-size: 13px; color: #4b5563; margin-bottom: 10px; }
    .meta span { font-weight: 600; color: #dc2626; }
    .steps { display: flex; flex-direction: column; gap: 4px; }
    .step { padding: 7px 12px; border-left: 3px solid #dc2626; background: #fef2f2; border-radius: 0 6px 6px 0; font-size: 13px; font-family: 'Consolas', monospace; }
    pre { background: #0f172a; color: #cbd5e1; padding: 14px; border-radius: 8px; overflow: auto; font-size: 13px; margin: 0; }
    #result { display: none; }
    .vs { margin-top: 24px; padding: 16px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; font-size: 13px; line-height: 1.7; }
    .vs strong { color: #92400e; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/">策略模式</a>
    <a href="/template">模板方法</a>
    <a href="/simple-factory">简单工厂</a>
    <a href="/factory-method" class="active">工厂方法</a>
    <a href="/abstract-factory">抽象工厂</a>
    <a href="/chain">责任链</a>
  </div>
  <div class="card">
    <h1>工厂方法模式 — 支付处理</h1>
    <div class="desc">
      <strong>核心：</strong>每种产品有自己的工厂子类，各自实现 <code>createProcessor()</code> 工厂方法。<br/>
      新增支付方式 = 新增一个工厂子类，不改现有代码（符合开闭原则）。
    </div>

    <div class="row">
      <label>支付方式</label>
      <select id="method">
        <option value="alipay">支付宝</option>
        <option value="wechat">微信支付</option>
        <option value="creditcard">信用卡</option>
      </select>
    </div>
    <div class="row">
      <label>金额（元）</label>
      <input id="amount" type="number" value="99.9" min="0.01" step="0.01" />
    </div>
    <button id="payBtn">发起支付</button>

    <div id="result">
      <div class="section-label">工厂与产品</div>
      <p class="meta">工厂类：<span id="factoryClass"></span> → 产品类：<span id="processorClass"></span></p>
      <div class="section-label">执行链路</div>
      <div id="steps" class="steps"></div>
      <div class="section-label">原始响应</div>
      <pre id="output"></pre>
    </div>

    <div class="vs">
      <strong>简单工厂 vs 工厂方法：</strong><br/>
      简单工厂 → 一个类 switch 搞定，改类型要改工厂代码<br/>
      工厂方法 → 每种产品一个工厂子类，新增产品加子类即可、不改已有代码
    </div>
  </div>

  <script>
    document.getElementById('payBtn').addEventListener('click', async () => {
      const method = document.getElementById('method').value;
      const amount = document.getElementById('amount').value;
      const resp = await fetch(`/api/payment?method=${method}&amount=${amount}`);
      const data = await resp.json();

      document.getElementById('factoryClass').textContent = data.factoryClass;
      document.getElementById('processorClass').textContent = data.processorClass;
      document.getElementById('steps').innerHTML =
        data.steps.map(s => `<div class="step">${s}</div>`).join('');
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      document.getElementById('result').style.display = 'block';
    });
  </script>
</body>
</html>
