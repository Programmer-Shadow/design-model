<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>策略模式 Demo</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fb; color: #1f2937; margin: 0; }
    .nav { background: #1e293b; padding: 12px 24px; display: flex; gap: 20px; align-items: center; }
    .nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 4px 8px; border-radius: 6px; }
    .nav a.active { color: #fff; background: #2563eb; }
    .nav a:hover:not(.active) { color: #e2e8f0; }
    .card { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    h1 { margin-top: 0; font-size: 22px; }
    .row { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
    label { width: 110px; }
    input, select { flex: 1; padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { width: 100%; margin-top: 8px; padding: 10px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; }
    pre { background: #0f172a; color: #cbd5e1; padding: 12px; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/" class="active">策略模式</a>
    <a href="/template">模板方法</a>
    <a href="/simple-factory">简单工厂</a>
    <a href="/factory-method">工厂方法</a>
    <a href="/abstract-factory">抽象工厂</a>
    <a href="/chain">责任链</a>
    <a href="/singleton">单例模式</a>
  </div>
  <div class="card">
    <h1>策略模式 - 订单折扣计算</h1>
    <div class="row">
      <label>单价</label>
      <input id="unitPrice" type="number" value="100" min="1" />
    </div>
    <div class="row">
      <label>数量</label>
      <input id="quantity" type="number" value="2" min="1" />
    </div>
    <div class="row">
      <label>策略</label>
      <select id="strategy">
        <option value="normal">原价</option>
        <option value="vip">VIP 九折</option>
        <option value="new-user">新用户减 20</option>
      </select>
    </div>
    <button id="calcBtn">计算总价</button>
    <p>返回结果：</p>
    <pre id="result">{}</pre>
  </div>

  <script>
    const resultEl = document.getElementById('result');
    document.getElementById('calcBtn').addEventListener('click', async () => {
      const unitPrice = document.getElementById('unitPrice').value;
      const quantity = document.getElementById('quantity').value;
      const strategy = document.getElementById('strategy').value;
      const url = `/api/quote?unitPrice=${encodeURIComponent(unitPrice)}&quantity=${encodeURIComponent(quantity)}&strategy=${encodeURIComponent(strategy)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      resultEl.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
